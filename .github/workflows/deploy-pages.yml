name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure Obsidian deploy key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OBSIDIAN_DEPLOY_KEY }}" > ~/.ssh/obsidian_deploy_key
          chmod 600 ~/.ssh/obsidian_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          printf 'Host github.com\n  IdentityFile ~/.ssh/obsidian_deploy_key\n  IdentitiesOnly yes\n' >> ~/.ssh/config

      - name: Sync Obsidian and build
        env:
          OBSIDIAN_REPO: git@github.com:masterMo66/obsidian-vault.git
          OBSIDIAN_BRANCH: main
          OBSIDIAN_INCLUDE_DIRS: 技术,哲思,金融,商业机会
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
